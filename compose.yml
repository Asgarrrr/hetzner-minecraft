services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft
    restart: unless-stopped
    ports:
      - "${MC_PORT:-25565}:25565"
    environment:
      EULA: "TRUE"
      TZ: "${TZ:-Europe/Paris}"
      TYPE: AUTO_CURSEFORGE
      CF_API_KEY: "${CF_API_KEY:?set CF_API_KEY in .env}"
      CF_SLUG: all-the-mods-10
      CF_FILENAME_MATCHER: "${CF_FILENAME_MATCHER:-6.6}"
      INIT_MEMORY: "${INIT_MEMORY:-4G}"
      MEMORY: "${MEMORY:-16G}"
      USE_AIKAR_FLAGS: "true"
      JVM_XX_OPTS: "-XX:+UseContainerSupport"
      MAX_TICK_TIME: "-1"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD:?set RCON_PASSWORD in .env}"
      RCON_PORT: "${RCON_PORT:-25575}"
      VIEW_DISTANCE: "${VIEW_DISTANCE:-6}"
      SIMULATION_DISTANCE: "${SIMULATION_DISTANCE:-4}"
      ENABLE_ROLLING_LOGS: "TRUE"
      MOTD: "${MOTD:-Eternia ATM10}"
    volumes:
      - ./volumes/minecraft:/data
    stdin_open: true
    tty: true
    stop_grace_period: 1m30s
